kind = "web"
previewPath = "/"
title = "Smart Scan Pharmacy"
version = "1.0.0"
id = "artifacts/smart-scan"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23687

[services.development]
run = "pnpm --filter @workspace/smart-scan run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/smart-scan", "run", "build" ]
publicDir = "artifacts/smart-scan/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23687"
BASE_PATH = "/"
